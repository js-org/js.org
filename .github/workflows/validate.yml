name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions: {}

jobs:
  validate-cnames:
    name: cnames_active.js
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      GH_EVENT_HASH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GH_EVENT_HASH }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: js-org/js.org-cleanup
          path: cleanup

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version-file: cleanup/.nvmrc
          cache: npm
          cache-dependency-path: cleanup/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cleanup

      - name: Validate cnames_active.js
        run: node index.js --validate ../cnames_active.js
        working-directory: cleanup

  validate-description:
    # Only validate descriptions for PRs, except when the PR is from Dependabot
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'

    name: PR description
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      message: ${{ steps.validate.outputs.message }}

    steps:
      - name: Validate PR description
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: validate
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const failures = [];

            // 1. Check both checkboxes
            const reasonableContent = /^[ \t]*-[ \t]+\[x\].*?There is reasonable content on the page/im.test(body);
            if (!reasonableContent) failures.push("Reasonable content checkbox is not checked.");

            const termsAndConditions = /^[ \t]*-[ \t]+\[x\].*?I have read and accepted the \[Terms and Conditions\]/im.test(body);
            if (!termsAndConditions) failures.push("Terms and conditions checkbox is not checked.");

            // 2. URL must be on the exact "The site content can be seen at ..." line
            // https://regex101.com/r/N36fsT
            const url = /^[ \t]*-[ \t]*The site content can be seen at[ \t]+(?:<)?(?:\[.*?\]\()?https?:\/\/[^\s>()]+(?:\))?(?:>)?/im.exec(body);
            if (!url) failures.push("Content URL is missing or not in the correct format.");

            // 3. Explanation must follow the blockquote marker
            const explanation = />\s*The site content is(?:\s*|\s*\n)(.+)(?:\s*|\s*\n)and is relevant to JavaScript developers specifically because(?:\s*|\s*\n)(.+)/i.exec(body);
            if (!explanation || explanation[1].trim().length <= 10 || explanation[2].trim().length <= 10) failures.push("Content explanation is missing or too short.");

            if (failures.length) {
              core.setOutput("message", failures.map(f => `- ${f}`).join("\n"));
              core.setFailed("❌ PR description format is invalid.");
            } else {
              console.log("✅ PR description format is valid.");
            }

  validate-comment:
    # Only leave comments on PRs, except when the PR is from Dependabot
    # Always run, even if the validation jobs fail, to ensure feedback is provided to the contributor
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'

    name: PR comment
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    needs:
      - validate-cnames
      - validate-description

    steps:
      - name: Generate message
        id: message
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          CNAMES_RESULT: ${{ needs.validate-cnames.result }}
          DESCRIPTION_RESULT: ${{ needs.validate-description.result }}
          DESCRIPTION_MESSAGE: ${{ needs.validate-description.outputs.message }}
        with:
          script: |
            const cnamesResult = process.env.CNAMES_RESULT;
            const descriptionResult = process.env.DESCRIPTION_RESULT;
            const descriptionMessage = process.env.DESCRIPTION_MESSAGE;
            
            const messages = [];
            
            // 1. cnames_active.js validation result, linking to the files changed tab for annotations
            if (cnamesResult === 'failure') {
              messages.push(
                "**❌ `cnames_active.js` validation failed due to being incorrectly formatted.**",
                `_[Check file annotations for failure details](${context.payload.pull_request.html_url}/files)._`,
                "", "---", "",
              );
            }

            // 2. PR description validation result, linking to the raw PR template file for reference
            if (descriptionResult === 'failure') {
              messages.push(
                "**❌ PR description validation failed due to being incorrectly formatted.**",
                `_[Use the provided template and ensure all information is provided](https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${context.payload.repository.default_branch}/PULL_REQUEST_TEMPLATE.md)._`,
                "",
                descriptionMessage,
                "", "---", "",
              );
            }

            if (messages.length) {
              messages.push("**⚠️ You must resolve these issues before your JS.org subdomain request can be accepted.**");
              core.setOutput("message", messages.join("\n"));
            } else {
              core.setOutput("message", "✅ All validations passed! Please wait for the JS.org maintainers to process your subdomain request.");
            }

      - name: Post comment
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3.0.1
        with:
          message: ${{ steps.message.outputs.message }}
          comment-tag: jsorg-validation
